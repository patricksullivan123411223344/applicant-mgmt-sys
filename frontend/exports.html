<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exports — Housing Processor</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div id="site-nav"></div>
    <div class="page">
      <header class="page-header">
        <h1>Excel exports</h1>
        <p class="hint">Generate a workbook from groups currently in the database.</p>
      </header>
      <section class="panel">
        <button type="button" id="export-button">Create Excel export</button>
        <p id="export-message" class="message" hidden></p>
        <p id="export-error" class="message error" hidden></p>
        <p id="export-link-wrap" hidden>
          <a id="export-link" href="#">Download latest export</a>
        </p>
      </section>
    </div>
    <script src="/js/exports-page.js" type="module"></script>
  </body>
</html>
