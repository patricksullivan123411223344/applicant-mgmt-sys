<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Groups — Housing Processor</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div id="site-nav"></div>
    <div class="page page-wide">
      <header class="page-header">
        <h1>Groups</h1>
        <p class="hint">Roommate groups ordered by permanent group number.</p>
      </header>

      <section class="panel">
        <form id="groups-filter" class="inline-filter">
          <label>
            Filter by group #
            <input id="filter-group-number" type="number" min="1" step="1" placeholder="e.g. 14" />
          </label>
          <button type="submit">Filter</button>
          <a class="text-link" href="/groups.html">Clear</a>
        </form>
        <p id="groups-meta" class="table-meta"></p>
        <p id="groups-error" class="message error" hidden></p>
        <p id="groups-empty" class="empty-state" hidden></p>
        <div class="table-wrap">
          <table class="crm-table">
            <thead>
              <tr>
                <th>Group #</th>
                <th>Status</th>
                <th>Members</th>
                <th>First received</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="groups-body"></tbody>
          </table>
        </div>
      </section>
    </div>
    <script src="/js/groups-page.js" type="module"></script>
  </body>
</html>
